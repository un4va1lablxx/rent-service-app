spring.application.name=rent-service

server.port=${PORT:8080}
server.address=0.0.0.0

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rent_service_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}


spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:local-dev-secret-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

rent.api-base-url=${RENT_API_BASE_URL:http://localhost:8080}
rent.web-app-url=${RENT_WEB_APP_URL:http://localhost:5173}
rent.mobile-deep-link-scheme=${RENT_MOBILE_DEEP_LINK_SCHEME:rentservice}

telegram.bot.proxy.enabled=${TELEGRAM_BOT_PROXY_ENABLED:false}
telegram.bot.proxy.host=${TELEGRAM_BOT_PROXY_HOST:}
telegram.bot.proxy.port=${TELEGRAM_BOT_PROXY_PORT:0}
